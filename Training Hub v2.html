}

// ─── MOBILE SIDEBAR ──────────────────────────────────────────────
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const bd=document.getElementById('sb-backdrop');
  const isOpen=sb.classList.contains('mob-open');
  if(isOpen){closeSidebar();}else{sb.classList.add('mob-open');bd.classList.add('open');document.body.style.overflow='hidden';}
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('mob-open');
  document.getElementById('sb-backdrop').classList.remove('open');
  document.body.style.overflow='';
}
function setMobTitle(t){const el=document.getElementById('mob-title');if(el)el.textContent=t;}

// ─── NAV ─────────────────────────────────────────────────────────
function showHub(){
  ST={view:'hub',raceId:null,tab:'today'};
  Object.values(_timers).forEach(clearInterval);_timers={};
  document.getElementById('view-hub').style.display='block';
  document.getElementById('view-race').style.display='none';
  setMobTitle('Training Hub');
  closeSidebar();
  renderSidebar();renderHub();
}

function showRace(raceId){
  ST={view:'race',raceId:raceId,tab:'today'};
  document.getElementById('view-hub').style.display='none';
  document.getElementById('view-race').style.display='block';
  document.querySelectorAll('.r-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab==='today'));
  ['today','plan','log','gear','overview'].forEach(t=>document.getElementById('tab-'+t).style.display=t==='today'?'block':'none');
  const r=DATA.races.find(x=>x.id===raceId);
  setMobTitle(r?r.name:'Race');
  closeSidebar();
  renderRace(raceId);renderSidebar();window.scrollTo(0,0);
}

function switchTab(tab,btn){
  ST.tab=tab;
  document.querySelectorAll('.r-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  ['today','plan','log','gear','overview'].forEach(t=>document.getElementById('tab-'+t).style.display=t===tab?'block':'none');
}

function showDeleteConfirm(raceId){
  // Dismiss any other open confirmations first
  document.querySelectorAll('.race-card.confirming').forEach(c=>c.classList.remove('confirming'));
  const card=document.getElementById('rcard_'+raceId);
  if(card) card.classList.add('confirming');
}
function hideDeleteConfirm(raceId){
  const card=document.getElementById('rcard_'+raceId);
  if(card) card.classList.remove('confirming');
}
function deleteRace(raceId){
  DATA.races=DATA.races.filter(r=>r.id!==raceId);
  save();
  // If currently viewing the deleted race, go back to hub
  if(ST.raceId===raceId) showHub(); else{renderSidebar();renderHub();}
}

// ─── MOBILE SWIPE & KEYBOARD ─────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeSidebar();closeWizard();closeEdit();
    document.querySelectorAll('.race-card.confirming').forEach(c=>c.classList.remove('confirming'));
  }
});
// Clicking outside a confirming card dismisses it
document.addEventListener('click',e=>{
  if(!e.target.closest('.race-card.confirming')&&!e.target.closest('.rc-delete-btn')){
    document.querySelectorAll('.race-card.confirming').forEach(c=>c.classList.remove('confirming'));
  }
});

// Swipe right to open sidebar, swipe left on sidebar to close
(function(){
  let x0=null;
  document.addEventListener('touchstart',e=>{x0=e.touches[0].clientX;},{passive:true});
  document.addEventListener('touchend',e=>{
    if(x0===null)return;
    const dx=e.changedTouches[0].clientX-x0;
    const sb=document.getElementById('sidebar');
    if(dx>60&&x0<40&&!sb.classList.contains('mob-open')) toggleSidebar();// swipe right from left edge
    if(dx<-60&&sb.classList.contains('mob-open')) closeSidebar();// swipe left to close
    x0=null;
  },{passive:true});
})();

function editSidebarUser(){

  const el=document.getElementById('sb-user-display');
  if(!el)return;
  el.innerHTML=`
    <div style="display:flex;flex-direction:column;gap:5px;width:100%">
      <input class="ie-input" id="ue-name" type="text" value="${p.name.replace(/"/g,'&quot;')}" placeholder="Your name" style="font-size:12px">
      <input class="ie-input" id="ue-year" type="text" value="${p.year}" placeholder="Year" style="font-size:11px;width:60px">
      <div style="display:flex;gap:5px;margin-top:3px">
        <button class="ie-save" onclick="saveSidebarUser()">Save</button>
        <button class="ie-cancel" onclick="renderSidebarUser()">Cancel</button>
      </div>
    </div>`;
  document.getElementById('ue-name').focus();
  document.getElementById('ue-name').addEventListener('keydown',e=>{if(e.key==='Enter')saveSidebarUser();if(e.key==='Escape')renderSidebarUser();});
}

function saveSidebarUser(){
  const name=(document.getElementById('ue-name')?.value||'').trim()||'Athlete';
  const year=(document.getElementById('ue-year')?.value||'').trim()||new Date().getFullYear().toString();
  saveUserProfile({name,year});
  renderSidebarUser();
}

// ─── RACE NAME INLINE EDIT ───────────────────────────────────────
function editRaceName(raceId){
  const r=DATA.races.find(x=>x.id===raceId);if(!r)return;
  const el=document.getElementById('rh-name');if(!el)return;
  const cur=r.name.replace(/"/g,'&quot;');
  el.outerHTML=`<div class="ie-wrap" id="rh-name-edit" style="flex-wrap:wrap;gap:8px">
    <input class="ie-input" id="rn-input" type="text" value="${cur}" style="font-size:clamp(22px,3.5vw,38px);font-family:'Barlow Condensed',sans-serif;font-weight:900;letter-spacing:.03em;text-transform:uppercase;flex:1;min-width:180px">
    <button class="ie-save" onclick="saveRaceName('${raceId}')">Save</button>
    <button class="ie-cancel" onclick="showRace('${raceId}')">Cancel</button>
  </div>`;
  const inp=document.getElementById('rn-input');
  if(inp){inp.focus();inp.select();
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')saveRaceName(raceId);if(e.key==='Escape')showRace(raceId);});
  }
}

function saveRaceName(raceId){
  const inp=document.getElementById('rn-input');
  const name=(inp?.value||'').trim();
  if(!name)return;
  const r=DATA.races.find(x=>x.id===raceId);
  if(r){r.name=name;save();}
  showRace(raceId);
  renderSidebar();
  // Update mobile title
  setMobTitle(name);
}

// ─── ATHLETE PROFILE EDIT ────────────────────────────────────────
let _profileEditRaceId=null;

function openProfileEdit(raceId){
  const r=DATA.races.find(x=>x.id===raceId);if(!r)return;
  _profileEditRaceId=raceId;
  const entries=Object.entries(r.profile||{});
  document.getElementById('edit-title').textContent='Edit Athlete Profile';
  document.getElementById('edit-body').innerHTML=`
    <div id="profile-edit-rows">
      ${entries.map(([k,v],i)=>`
        <div class="profile-edit-row" id="per_${i}">
          <span class="profile-edit-key">${k}</span>
          <span class="profile-edit-val"><input type="text" data-key="${k.replace(/"/g,'&quot;')}" value="${v.replace(/"/g,'&quot;')}" placeholder="Value"></span>
          <button onclick="removeProfileRow(${i})" style="background:none;border:none;color:var(--t3);cursor:pointer;padding:2px 4px;font-size:15px;flex-shrink:0" title="Remove">×</button>
        </div>`).join('')}
    </div>
    <div class="profile-add-row" id="profile-add-row">
      <input id="par-key" type="text" placeholder="Field name (e.g. Goal pace)">
      <input id="par-val" type="text" placeholder="Value">
      <button class="ie-save" onclick="confirmAddProfileRow()" style="white-space:nowrap">Add</button>
      <button class="ie-cancel" onclick="document.getElementById('profile-add-row').classList.remove('visible')">×</button>
    </div>
    <button class="btn-add-profile-row" onclick="document.getElementById('profile-add-row').classList.add('visible');document.getElementById('par-key').focus()">+ Add field</button>`;
  document.getElementById('edit-overlay').classList.add('open');
}

function removeProfileRow(idx){
  const row=document.getElementById('per_'+idx);
  if(row)row.remove();
}

function confirmAddProfileRow(){
  const key=(document.getElementById('par-key')?.value||'').trim();
  const val=(document.getElementById('par-val')?.value||'').trim();
  if(!key)return;
  const rows=document.getElementById('profile-edit-rows');
  const i=rows.children.length;
  const div=document.createElement('div');
  div.className='profile-edit-row';div.id='per_'+i;
  div.innerHTML=`<span class="profile-edit-key">${key}</span>
    <span class="profile-edit-val"><input type="text" data-key="${key.replace(/"/g,'&quot;')}" value="${val.replace(/"/g,'&quot;')}" placeholder="Value"></span>
    <button onclick="removeProfileRow(${i})" style="background:none;border:none;color:var(--t3);cursor:pointer;padding:2px 4px;font-size:15px">×</button>`;
  rows.appendChild(div);
  document.getElementById('par-key').value='';
  document.getElementById('par-val').value='';
  document.getElementById('par-key').focus();
  document.getElementById('profile-add-row').classList.remove('visible');
}

function saveProfileEdit(){
  if(!_profileEditRaceId)return;
  const r=DATA.races.find(x=>x.id===_profileEditRaceId);if(!r)return;
  const newProfile={};
  document.querySelectorAll('#profile-edit-rows .profile-edit-val input').forEach(inp=>{
    const key=inp.getAttribute('data-key');
    const val=inp.value.trim();
    if(key&&val) newProfile[key]=val;
  });
  r.profile=newProfile;
  save();
  closeEdit();
  showRace(_profileEditRaceId);
}

// ─── THEME ───────────────────────────────────────────────────────
function setTheme(name,el){
  document.documentElement.setAttribute('data-theme',name);
  localStorage.setItem('thubTheme',name);
  document.querySelectorAll('.theme-swatch').forEach(s=>s.classList.toggle('active',s.dataset.t===name));
}
(function initTheme(){
  const t=localStorage.getItem('thubTheme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
  // Highlight active swatch after DOM ready
  requestAnimationFrame(()=>{
    document.querySelectorAll('.theme-swatch').forEach(s=>s.classList.toggle('active',s.dataset.t===t));
  });
})();

// ─── INIT ────────────────────────────────────────────────────────
showHub();
</script>
