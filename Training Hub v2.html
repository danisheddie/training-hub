<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Hub — Danish Eddie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ───────────────────────────────────────────────── */
:root{
  --bg:#0d0e12; --s1:#13141d; --s2:#1a1b27; --s3:#22243a;
  --border:#252637; --border2:#2e3048;
  --red:#e53935; --red2:#ff4444; --red-dim:rgba(229,57,53,.1); --red-border:rgba(229,57,53,.22);
  --white:#eff0f8; --t1:#c8c9e0; --t2:#8889aa; --t3:#4e4f6e;
  --swim:#38bdf8; --swim-dim:rgba(56,189,248,.1);
  --bike:#fbbf24; --bike-dim:rgba(251,191,36,.1);
  --run:#34d399;  --run-dim:rgba(52,211,153,.1);
  --tri:#a78bfa;  --hyrox:#f87171;
  --z1:#60a5fa; --z2:#34d399; --z3:#fbbf24; --z4:#fb923c; --z5:#f87171;
  --sidebar:252px; --r:10px; --rs:6px;
  --shadow:0 2px 16px rgba(0,0,0,.45);
  --shadow-sm:0 1px 6px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:'Inter',sans-serif;font-size:14px;line-height:1.65;display:flex;min-height:100vh;}
button{font-family:inherit;}
a{color:inherit;text-decoration:none;}
svg{display:block;}

/* ─── SIDEBAR ──────────────────────────────────────────────── */
#sidebar{
  width:var(--sidebar);background:var(--s1);border-right:1px solid var(--border);
  position:fixed;inset:0 auto 0 0;z-index:60;display:flex;flex-direction:column;overflow-y:auto;
}
.sb-logo{padding:22px 18px 18px;border-bottom:1px solid var(--border);}
.sb-logo-mark{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:19px;letter-spacing:.1em;text-transform:uppercase;line-height:1;}
.sb-logo-mark em{color:var(--red);font-style:normal;}
.sb-logo-sub{font-size:11px;color:var(--t3);margin-top:3px;letter-spacing:.04em;}
.sb-section{padding:16px 18px 6px;font-size:10px;letter-spacing:.18em;color:var(--t3);text-transform:uppercase;font-weight:600;}
.sb-race{
  display:flex;align-items:center;gap:10px;padding:9px 12px;margin:1px 8px;
  border-radius:var(--rs);cursor:pointer;transition:background .12s;border:1px solid transparent;
}
.sb-race:hover{background:var(--s2);}
.sb-race.active{background:var(--red-dim);border-color:var(--red-border);}
.sb-race-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-race-icon svg{width:14px;height:14px;}
.sb-race-icon.c-tri{background:rgba(167,139,250,.15);color:var(--tri);}
.sb-race-icon.c-run{background:rgba(52,211,153,.12);color:var(--run);}
.sb-race-icon.c-hyrox{background:rgba(248,113,113,.12);color:var(--hyrox);}
.sb-race-icon.c-bike{background:rgba(251,191,36,.12);color:var(--bike);}
.sb-race-text{flex:1;min-width:0;}
.sb-race-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--white);}
.sb-race-meta{font-size:11px;color:var(--t2);margin-top:1px;}
.sb-race-badge{width:6px;height:6px;border-radius:50%;background:#fbbf24;flex-shrink:0;}
.sb-footer{margin-top:auto;padding:14px;}
.btn-new-race{
  width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--red);color:#fff;border:none;border-radius:var(--rs);padding:11px 14px;
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;
  letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .18s,opacity .18s;
}
.btn-new-race:hover{background:var(--red2);}
.btn-new-race svg{width:15px;height:15px;}
.sb-divider{height:1px;background:var(--border);margin:8px 14px;}

/* ─── MAIN ──────────────────────────────────────────────────── */
#main{margin-left:var(--sidebar);flex:1;min-height:100vh;overflow-x:hidden;}

/* ─── HUB ───────────────────────────────────────────────────── */
#view-hub{padding:36px 40px;}
.hub-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:12px;}
.hub-header h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:32px;letter-spacing:.03em;text-transform:uppercase;line-height:1;}
.hub-header p{color:var(--t2);font-size:13px;margin-top:5px;}
.hub-date-chip{font-size:12px;color:var(--t3);background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;}

/* This Week panel */
.this-week-panel{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:28px;overflow:hidden;}
.this-week-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.this-week-header h3{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:8px;}
.this-week-header h3 span{font-size:12px;font-family:'Inter',sans-serif;font-weight:500;letter-spacing:0;color:var(--t2);text-transform:none;background:var(--s2);border:1px solid var(--border);border-radius:4px;padding:2px 8px;}
.this-week-body{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));}
.tw-day{padding:14px 18px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.tw-day:last-child{border-right:none;}
.tw-day-name{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--t3);margin-bottom:6px;font-weight:600;}
.tw-sessions{display:flex;flex-direction:column;gap:5px;}
.tw-session{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--t1);}
.tw-session-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.tw-rest{font-size:12px;color:var(--t3);font-style:italic;}
.tw-blocked{font-size:11px;color:var(--t3);background:var(--s2);border-radius:3px;padding:2px 7px;width:fit-content;}
.tw-empty{padding:20px;text-align:center;color:var(--t3);font-size:13px;grid-column:1/-1;}

/* Race grid */
.hub-section-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;text-transform:uppercase;letter-spacing:.08em;color:var(--t2);margin-bottom:14px;}
.race-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.race-card{
  background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;
  cursor:pointer;transition:border-color .18s,box-shadow .18s;
}
.race-card:hover{border-color:var(--border2);box-shadow:0 4px 24px rgba(0,0,0,.5);}
.race-card-stripe{height:3px;}
.race-card-stripe.c-tri{background:linear-gradient(90deg,var(--swim),var(--bike),var(--run));}
.race-card-stripe.c-run{background:var(--run);}
.race-card-stripe.c-hyrox{background:var(--hyrox);}
.race-card-stripe.c-bike{background:var(--bike);}
.race-card-inner{padding:18px 20px;}
.rc-type{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--t3);margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.rc-type svg{width:11px;height:11px;}
.rc-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:.03em;line-height:1.1;margin-bottom:3px;}
.rc-date{font-size:12px;color:var(--t2);margin-bottom:14px;display:flex;align-items:center;gap:5px;}
.rc-date svg{width:11px;height:11px;color:var(--t3);}
.rc-stats{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;margin-bottom:14px;}
.rc-stat{flex:1;text-align:center;padding:10px 8px;border-right:1px solid var(--border);}
.rc-stat:last-child{border-right:none;}
.rc-stat-n{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;line-height:1;}
.rc-stat-l{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-top:2px;}
.rc-goal{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.rc-goal-badge{background:var(--red-dim);color:var(--red2);border:1px solid var(--red-border);font-size:11px;font-weight:600;padding:3px 9px;border-radius:4px;letter-spacing:.03em;}
.rc-conflict{font-size:11px;color:#fbbf24;display:flex;align-items:center;gap:4px;}
.rc-conflict svg{width:11px;height:11px;}
/* Delete trigger button on race card */
.rc-delete-btn{background:transparent;border:none;color:var(--t3);cursor:pointer;padding:4px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;transition:color .15s,background .15s;flex-shrink:0;}
.rc-delete-btn svg{width:14px;height:14px;display:block;}
.rc-delete-btn:hover{color:#f87171;background:rgba(248,113,113,.1);}
/* Confirmation strip — hidden by default, shown when .confirming */
.rc-confirm-strip{display:none;align-items:center;justify-content:space-between;gap:8px;padding:10px 20px;background:rgba(239,68,68,.07);border-top:1px solid rgba(239,68,68,.18);}
.race-card.confirming{border-color:rgba(239,68,68,.35);}
.race-card.confirming .rc-confirm-strip{display:flex;}
.rc-confirm-msg{font-size:12px;color:#f87171;font-weight:500;}
.rc-confirm-btns{display:flex;gap:6px;}
.btn-confirm-cancel{background:transparent;border:1px solid var(--border2);color:var(--t2);border-radius:5px;padding:5px 12px;font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:border-color .15s;}
.btn-confirm-cancel:hover{border-color:var(--t1);color:var(--white);}
.btn-confirm-delete{background:#ef4444;border:none;color:#fff;border-radius:5px;padding:5px 14px;font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:5px;}
.btn-confirm-delete svg{width:12px;height:12px;}
.btn-confirm-delete:hover{background:#dc2626;}
.rc-phase{font-size:11px;color:var(--t3);}
/* progress bar on card */
.rc-progress{height:2px;background:var(--border);margin-top:14px;border-radius:1px;}
.rc-progress-fill{height:100%;border-radius:1px;background:var(--run);transition:width .5s;}
.empty-hub{text-align:center;padding:80px 40px;color:var(--t3);}
.empty-hub svg{width:48px;height:48px;margin:0 auto 14px;color:var(--border2);}
.empty-hub h3{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;text-transform:uppercase;color:var(--t2);margin-bottom:4px;}

/* ─── RACE VIEW ──────────────────────────────────────────────── */
#view-race{display:none;}
.race-header{
  background:var(--s1);border-bottom:1px solid var(--border);
  padding:24px 40px 0;
}
.race-back{display:flex;align-items:center;gap:5px;color:var(--t3);font-size:12px;cursor:pointer;margin-bottom:14px;width:fit-content;transition:color .15s;}
.race-back:hover{color:var(--white);}
.race-back svg{width:13px;height:13px;}
.race-header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap;}
.rh-left{}
.rh-type{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--t3);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.rh-type svg{width:12px;height:12px;}
.rh-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(26px,3.5vw,42px);letter-spacing:.03em;text-transform:uppercase;line-height:1;}
.rh-meta{display:flex;align-items:center;gap:14px;margin-top:8px;flex-wrap:wrap;}
.rh-date{font-size:12px;color:var(--t2);display:flex;align-items:center;gap:5px;}
.rh-date svg{width:11px;height:11px;color:var(--t3);}
.rh-goal{background:var(--red-dim);border:1px solid var(--red-border);color:var(--red2);font-size:11px;font-weight:600;padding:3px 10px;border-radius:4px;}
/* countdown */
.rh-right{flex-shrink:0;}
.countdown{display:flex;gap:8px;align-items:center;}
.cd-block{text-align:center;}
.cd-val{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:32px;line-height:1;
  background:var(--s2);border:1px solid var(--border2);border-radius:var(--rs);
  padding:.15em .5em;min-width:58px;display:block;letter-spacing:.02em;
}
.cd-sep{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:var(--t3);margin-top:-4px;}
.cd-lbl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);margin-top:4px;}
/* splits row */
.splits-row{display:flex;gap:6px;margin:18px 0 0;overflow-x:auto;padding-bottom:1px;flex-wrap:wrap;}
.split-pill{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--s2);white-space:nowrap;font-size:13px;}
.split-pill svg{width:13px;height:13px;}
.split-pill.p-swim{border-color:rgba(56,189,248,.25);color:var(--swim);}
.split-pill.p-bike{border-color:rgba(251,191,36,.25);color:var(--bike);}
.split-pill.p-run{border-color:rgba(52,211,153,.25);color:var(--run);}
.split-pill.p-total{border-color:var(--red-border);color:var(--red2);}
.split-time{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;}
.split-lbl{font-size:10px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;}
.split-pace{font-size:11px;color:var(--t3);}
/* phase progress bar */
.phase-progress-bar{margin:16px 0 0;display:flex;gap:3px;}
.pp-seg{flex:1;height:3px;border-radius:2px;background:var(--border2);transition:background .3s;}
.pp-seg.done{background:var(--t3);}
.pp-seg.current{background:var(--red);}
.pp-label{font-size:10px;color:var(--t3);margin-top:5px;letter-spacing:.06em;}
/* tabs */
.race-tabs{display:flex;margin-top:18px;gap:0;border-top:1px solid var(--border);}
.r-tab{
  padding:12px 22px;background:transparent;border:none;color:var(--t2);cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.1em;
  text-transform:uppercase;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;
}
.r-tab:hover{color:var(--white);}
.r-tab.active{color:var(--white);border-bottom-color:var(--red);}
.race-body{padding:32px 40px;}

/* ─── TODAY TAB ─────────────────────────────────────────────── */
.today-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
.today-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:18px;}
.today-card h4{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--t3);margin-bottom:12px;font-weight:600;}
.today-session-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.today-session-row:last-child{border-bottom:none;}
.today-session-row input[type=checkbox]{accent-color:var(--red);width:16px;height:16px;cursor:pointer;flex-shrink:0;}
.today-session-text{flex:1;}
.today-session-name{font-size:13px;font-weight:500;color:var(--white);}
.today-session-type{font-size:11px;margin-top:1px;}
.today-session-type.c-swim{color:var(--swim);}
.today-session-type.c-bike{color:var(--bike);}
.today-session-type.c-run{color:var(--run);}
.today-done input:checked~.today-session-text .today-session-name{text-decoration:line-through;color:var(--t3);}

/* ─── OVERVIEW TAB ───────────────────────────────────────────── */
.ov-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
.ov-stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;}
.ov-stat-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--t3);margin-bottom:6px;font-weight:600;}
.ov-stat-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:30px;line-height:1;}
.ov-stat-sub{font-size:11px;color:var(--t2);margin-top:3px;}
.ov-two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:4px;}
.ov-section-title{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;font-weight:600;}
.zone-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;flex-wrap:wrap;}
.zone-row:last-child{border-bottom:none;}
.zone-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.zone-name{font-weight:500;min-width:80px;}
.zone-feel{font-size:11px;color:var(--t2);flex-basis:100%;padding-left:16px;margin-top:-4px;}
.profile-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.profile-row:last-child{border-bottom:none;}
.profile-key{color:var(--t2);text-transform:capitalize;}
.profile-val{color:var(--t1);text-align:right;max-width:60%;font-size:12px;}
.conflict-strip{background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.2);border-radius:var(--rs);padding:9px 13px;margin-bottom:20px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t1);}
.conflict-strip svg{width:13px;height:13px;color:#fbbf24;flex-shrink:0;}
.conflict-strip strong{color:#fbbf24;}
.notes-box{background:var(--s1);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:var(--rs);padding:12px 16px;font-size:13px;color:var(--t1);margin-top:20px;line-height:1.6;}
.btn-delete{background:none;border:none;color:var(--t3);font-size:12px;cursor:pointer;padding:0;display:inline-flex;align-items:center;gap:5px;transition:color .15s;margin-top:16px;}
.btn-delete:hover{color:#f87171;}
.btn-delete svg{width:12px;height:12px;}

/* ─── PLAN TAB ───────────────────────────────────────────────── */
.plan-phases{display:flex;flex-direction:column;gap:10px;}
.phase-block{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.phase-toggle-row{display:flex;align-items:center;gap:14px;padding:16px 18px;cursor:pointer;user-select:none;transition:background .12s;}
.phase-toggle-row:hover{background:rgba(255,255,255,.02);}
.ph-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:32px;line-height:1;width:36px;flex-shrink:0;}
.ph1 .ph-num{color:var(--z1);} .ph2 .ph-num{color:var(--z3);} .ph3 .ph-num{color:var(--z5);} .ph4 .ph-num{color:var(--t2);}
.ph-info{flex:1;}
.ph-info h3{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;text-transform:uppercase;letter-spacing:.05em;}
.ph-info .ph-dates{font-size:11px;color:var(--t3);margin-top:2px;}
.ph-info .ph-desc{font-size:12px;color:var(--t2);margin-top:3px;}
.ph-meta{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.ph-weeks-count{font-size:11px;color:var(--t3);}
.ph-chevron{color:var(--t3);transition:transform .25s;}
.ph-chevron.open{transform:rotate(180deg);}
.ph-body{display:none;border-top:1px solid var(--border);}
.ph-body.open{display:block;}
/* week cards inside phase */
.week-list{display:flex;flex-direction:column;}
.week-card{border-bottom:1px solid var(--border);transition:background .12s;}
.week-card:last-child{border-bottom:none;}
.week-card.current{background:rgba(229,57,53,.04);border-left:2px solid var(--red);}
.week-card.recovery{background:rgba(96,165,250,.03);}
.week-card-head{display:flex;align-items:center;gap:10px;padding:12px 18px;cursor:pointer;}
.week-card-head:hover{background:rgba(255,255,255,.02);}
.wk-num{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;background:var(--s3);color:var(--t1);padding:2px 7px;border-radius:3px;flex-shrink:0;}
.wk-dates{font-size:11px;color:var(--t3);flex:1;}
.wk-tags{display:flex;gap:5px;}
.wk-tag{font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.06em;padding:2px 7px;border-radius:3px;}
.wk-tag.current{background:var(--red-dim);color:var(--red2);border:1px solid var(--red-border);}
.wk-tag.recovery{background:rgba(96,165,250,.1);color:var(--z1);border:1px solid rgba(96,165,250,.2);}
.wk-tag.brick{background:rgba(167,139,250,.1);color:var(--tri);border:1px solid rgba(167,139,250,.2);}
.wk-chevron{color:var(--t3);transition:transform .2s;}
.wk-chevron.open{transform:rotate(180deg);}
.wk-body{display:none;padding:4px 18px 14px;}
.wk-body.open{display:block;}
.day-rows{display:flex;flex-direction:column;gap:3px;margin-top:4px;}
.day-row{display:flex;align-items:flex-start;gap:10px;padding:7px 10px;border-radius:var(--rs);transition:background .1s;}
.day-row:hover{background:rgba(255,255,255,.025);}
.day-row.is-rest{opacity:.55;}
.day-row.is-rest:hover{opacity:1;}
.day-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);font-weight:600;width:28px;flex-shrink:0;padding-top:2px;}
.day-sessions{display:flex;flex-wrap:wrap;gap:5px;flex:1;}
.sess-chip{font-size:12px;padding:3px 9px;border-radius:4px;display:inline-flex;align-items:center;gap:5px;line-height:1.4;}
.sess-chip svg{width:11px;height:11px;flex-shrink:0;}
.sess-chip.c-swim{background:var(--swim-dim);color:var(--swim);}
.sess-chip.c-bike{background:var(--bike-dim);color:var(--bike);}
.sess-chip.c-run{background:var(--run-dim);color:var(--run);}
.sess-chip.c-brick{background:rgba(167,139,250,.1);color:var(--tri);}
.sess-chip.c-rest{background:var(--s3);color:var(--t3);font-style:italic;}
.sess-chip.c-gym{background:rgba(248,113,113,.1);color:var(--hyrox);}
.day-edit-btn{background:transparent;border:1px solid var(--border);color:var(--t3);border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;display:none;white-space:nowrap;transition:color .12s,border-color .12s;align-items:center;gap:3px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.05em;}
.day-row:hover .day-edit-btn{display:inline-flex;}
.day-edit-btn:hover{color:var(--white);border-color:var(--border2);}
.day-edit-btn svg{width:11px;height:11px;}
.phase-note-strip{margin:10px 18px 14px;background:var(--s2);border-left:2px solid var(--red);border-radius:0 var(--rs) var(--rs) 0;padding:9px 13px;font-size:12px;color:var(--t1);}
.phase-note-strip strong{color:var(--white);}

/* ─── LOG TAB ────────────────────────────────────────────────── */
.log-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.log-stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.log-stat-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);margin-bottom:5px;font-weight:600;}
.log-stat-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;}
.log-stat-sub{font-size:11px;color:var(--t2);margin-top:2px;}
.log-list{display:flex;flex-direction:column;gap:8px;}
.log-week{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.log-week.current{border-color:var(--border2);}
.log-week-head{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .12s;}
.log-week-head:hover{background:rgba(255,255,255,.02);}
.log-week-num{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;color:var(--white);}
.log-week-dates{font-size:11px;color:var(--t3);flex:1;}
.log-week-prog{font-size:11px;color:var(--t2);}
.log-bar{height:2px;background:var(--border);}
.log-bar-fill{height:100%;background:var(--red);transition:width .4s;}
.log-week-body{display:none;padding:14px 16px;}
.log-week-body.open{display:block;}
.log-rows{display:flex;flex-direction:column;gap:0;}
.log-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.log-row:last-child{border-bottom:none;}
.log-row-day{width:32px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);font-weight:600;flex-shrink:0;}
.log-row-plan{flex:1;color:var(--t1);}
.log-row-check input{accent-color:var(--red);width:15px;height:15px;cursor:pointer;}
.log-row-note input{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--white);font-size:12px;width:160px;padding:2px 0;outline:none;font-family:inherit;}
.log-row-note input:focus{border-bottom-color:var(--red);}
.log-refl{margin-top:12px;}
.log-refl label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);display:block;margin-bottom:5px;font-weight:600;}
.log-refl textarea{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);color:var(--t1);font-family:inherit;font-size:12px;padding:9px;resize:vertical;min-height:60px;outline:none;}
.log-refl textarea:focus{border-color:var(--border2);}

/* ─── SESSION STATUS (3-state: none → done → skipped) ────────── */
/* Compact cycle button — used in Log tab rows */
.status-btn{
  width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);
  background:transparent;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:all .18s;flex-shrink:0;padding:0;
}
.status-btn svg{width:12px;height:12px;display:block;}
.status-btn:hover{border-color:var(--run);background:rgba(52,211,153,.08);}
.status-btn.s-done{background:var(--run);border-color:var(--run);}
.status-btn.s-done svg{color:#fff;}
.status-btn.s-done:hover{filter:brightness(1.1);}
.status-btn.s-skipped{background:rgba(251,191,36,.12);border-color:var(--bike);}
.status-btn.s-skipped svg{color:var(--bike);}
.status-btn.s-skipped:hover{filter:brightness(1.1);}
/* Row-level treatment */
.log-row.s-done .log-row-plan{color:var(--t2);}
.log-row.s-skipped .log-row-plan{text-decoration:line-through;color:var(--t3);}
.status-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:700;margin-top:2px;}
.status-label.s-done{color:var(--run);}
.status-label.s-skipped{color:var(--bike);}
/* Two-button row — used in Today tab */
.today-action-btns{display:flex;gap:6px;flex-shrink:0;}
.btn-mark-done,.btn-mark-skip{
  border:none;border-radius:20px;font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:12px;letter-spacing:.06em;cursor:pointer;
  padding:5px 12px;display:flex;align-items:center;gap:5px;
  transition:all .18s;white-space:nowrap;
}
.btn-mark-done svg,.btn-mark-skip svg{width:12px;height:12px;}
.btn-mark-done{background:rgba(52,211,153,.12);color:var(--run);border:1px solid rgba(52,211,153,.25);}
.btn-mark-done.active{background:var(--run);color:#fff;border-color:var(--run);}
.btn-mark-done:hover:not(.active){background:rgba(52,211,153,.2);}
.btn-mark-skip{background:rgba(251,191,36,.1);color:var(--bike);border:1px solid rgba(251,191,36,.2);}
.btn-mark-skip.active{background:var(--bike);color:#111;border-color:var(--bike);}
.btn-mark-skip:hover:not(.active){background:rgba(251,191,36,.2);}
/* Skipped session visual in today card */
.today-session-name.s-skipped{text-decoration:line-through;color:var(--t3);}
.today-session-name.s-done{color:var(--t2);}
/* Custom workout rows */
.custom-badge{font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--tri);background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);border-radius:3px;padding:1px 6px;flex-shrink:0;}
.custom-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.custom-row-text{flex:1;font-size:13px;}
.custom-row-text.s-done{color:var(--t2);}
.custom-row-text.s-skipped{text-decoration:line-through;color:var(--t3);}
.btn-remove-custom{background:transparent;border:none;color:var(--t3);cursor:pointer;padding:2px 4px;font-size:16px;line-height:1;transition:color .15s;flex-shrink:0;}
.btn-remove-custom:hover{color:#f87171;}
.btn-add-custom{background:transparent;border:1px dashed var(--border2);color:var(--t2);border-radius:var(--rs);padding:8px 14px;font-size:13px;cursor:pointer;width:100%;text-align:center;transition:all .18s;margin-top:10px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-add-custom:hover{border-color:var(--t1);color:var(--white);background:rgba(255,255,255,.03);}
.btn-add-custom svg{width:14px;height:14px;}
.custom-input-row{display:none;align-items:center;gap:6px;margin-top:10px;}
.custom-input-row.visible{display:flex;}
.custom-input-row input{flex:1;background:var(--s2);border:1px solid var(--border2);border-radius:var(--rs);color:var(--white);font-family:inherit;font-size:13px;padding:8px 11px;outline:none;transition:border-color .18s;}
.custom-input-row input:focus{border-color:var(--red);}
.btn-custom-add{background:var(--red);border:none;color:#fff;border-radius:var(--rs);padding:8px 14px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.06em;cursor:pointer;transition:background .15s;white-space:nowrap;}
.btn-custom-add:hover{background:var(--red2);}
.btn-custom-cancel{background:transparent;border:1px solid var(--border2);color:var(--t2);border-radius:var(--rs);padding:8px 10px;font-size:12px;cursor:pointer;transition:border-color .15s;white-space:nowrap;}
.btn-custom-cancel:hover{border-color:var(--t1);}

/* ─── GEAR TAB ───────────────────────────────────────────────── */
.gear-groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
.gear-group{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:18px;}
.gear-group-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.gear-group-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;text-transform:uppercase;letter-spacing:.06em;}
.gear-prog{font-size:11px;color:var(--t3);}
.gear-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);}
.gear-item:last-child{border-bottom:none;}
.gear-item input[type=checkbox]{accent-color:var(--red);width:14px;height:14px;cursor:pointer;flex-shrink:0;}
.gear-item label{font-size:13px;color:var(--t1);cursor:pointer;transition:color .15s;}
.gear-item input:checked+label{color:var(--t3);text-decoration:line-through;}

/* ─── WIZARD ─────────────────────────────────────────────────── */
#wiz-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
#wiz-overlay.open{display:flex;}
#wiz-modal{
  background:var(--s1);border:1px solid var(--border2);border-radius:14px;
  width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);
}
.wiz-top{padding:24px 26px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
.wiz-top-left h2{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;text-transform:uppercase;letter-spacing:.05em;}
.wiz-top-left p{color:var(--t2);font-size:13px;margin-top:3px;}
.wiz-x{background:none;border:1px solid var(--border2);border-radius:var(--rs);color:var(--t2);cursor:pointer;padding:6px;display:flex;transition:color .15s;}
.wiz-x:hover{color:var(--white);}
.wiz-x svg{width:15px;height:15px;}
.wiz-steps-row{display:flex;align-items:center;gap:6px;padding:18px 26px 0;}
.wiz-step-pip{display:flex;align-items:center;gap:6px;flex:1;}
.wiz-step-circle{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;border:1px solid var(--border2);color:var(--t3);background:var(--s2);transition:all .2s;}
.wiz-step-circle.done{background:var(--s3);border-color:var(--border2);color:var(--t2);}
.wiz-step-circle.active{background:var(--red);border-color:var(--red);color:#fff;}
.wiz-step-line{flex:1;height:1px;background:var(--border);}
.wiz-step-line.done{background:var(--border2);}
.wiz-body{padding:24px 26px;}
.wiz-field{margin-bottom:18px;}
.wiz-label{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:8px;display:block;letter-spacing:.02em;}
.wiz-input,.wiz-select{
  width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:var(--rs);
  color:var(--white);font-family:inherit;font-size:14px;padding:10px 13px;outline:none;
  transition:border-color .18s;
}
.wiz-input:focus,.wiz-select:focus{border-color:var(--red);}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.opt-btn{
  background:var(--s2);border:1px solid var(--border2);border-radius:var(--rs);
  padding:12px 13px;cursor:pointer;text-align:left;transition:border-color .15s,background .15s;
  color:var(--white);
}
.opt-btn:hover{border-color:var(--border2);background:var(--s3);}
.opt-btn.selected{border-color:var(--red);background:var(--red-dim);}
.opt-title{font-size:13px;font-weight:600;margin-bottom:2px;}
.opt-desc{font-size:11px;color:var(--t3);line-height:1.4;}
.opt-other-wrap{margin-top:7px;display:none;}
.opt-other-wrap.visible{display:block;}
/* Consideration chips — step 6 */
.chip-group{margin-bottom:18px;}
.chip-group-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--t3);font-weight:600;margin-bottom:8px;display:block;}
.chip-grid{display:flex;flex-wrap:wrap;gap:7px;}
.chip-toggle{background:var(--s2);border:1px solid var(--border2);border-radius:20px;color:var(--t1);cursor:pointer;font-size:12px;padding:6px 13px;transition:all .15s;font-family:'Inter',sans-serif;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.chip-toggle svg{width:12px;height:12px;opacity:0;transition:opacity .15s;}
.chip-toggle:hover{border-color:var(--t2);color:var(--white);}
.chip-toggle.selected{background:var(--red-dim);border-color:var(--red-border);color:var(--red2);}
.chip-toggle.selected svg{opacity:1;}
.considerations-textarea{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:var(--rs);color:var(--white);font-family:inherit;font-size:13px;padding:10px 12px;outline:none;resize:vertical;min-height:80px;transition:border-color .18s;margin-top:4px;}
.considerations-textarea:focus{border-color:var(--red);}
.considerations-hint{font-size:11px;color:var(--t3);margin-top:5px;line-height:1.5;}
.wiz-footer{padding:14px 26px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.wiz-step-lbl{font-size:11px;color:var(--t3);}
.wiz-footer-btns{display:flex;gap:8px;}
.btn-wiz-back{background:transparent;border:1px solid var(--border2);color:var(--t1);border-radius:var(--rs);padding:9px 18px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;transition:border-color .15s;}
.btn-wiz-back:hover{border-color:var(--t2);}
.btn-wiz-next{background:var(--red);border:none;color:#fff;border-radius:var(--rs);padding:9px 22px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:.08em;text-transform:uppercase;transition:background .15s;}
.btn-wiz-next:hover{background:var(--red2);}

/* ─── EDIT MODAL ─────────────────────────────────────────────── */
#edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;}
#edit-overlay.open{display:flex;}
#edit-modal{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r);width:100%;max-width:460px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow);}
.edit-top{padding:20px 22px 0;display:flex;justify-content:space-between;align-items:center;}
.edit-top h3{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;text-transform:uppercase;letter-spacing:.05em;}
.edit-close{background:none;border:1px solid var(--border2);border-radius:var(--rs);color:var(--t2);cursor:pointer;padding:5px;display:flex;transition:color .15s;}
.edit-close:hover{color:var(--white);}
.edit-close svg{width:14px;height:14px;}
.edit-body{padding:18px 22px;}
.edit-field{margin-bottom:13px;}
.edit-field label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);display:block;margin-bottom:5px;font-weight:600;}
.edit-field input{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:var(--rs);color:var(--white);font-family:inherit;font-size:13px;padding:8px 11px;outline:none;transition:border-color .15s;}
.edit-field input:focus{border-color:var(--red);}
.edit-foot{padding:13px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.btn-edit-cancel{background:transparent;border:1px solid var(--border2);color:var(--t1);border-radius:var(--rs);padding:8px 16px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;transition:border-color .15s;}
.btn-edit-cancel:hover{border-color:var(--t2);}
.btn-edit-save{background:var(--red);border:none;color:#fff;border-radius:var(--rs);padding:8px 20px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;transition:background .15s;}
.btn-edit-save:hover{background:var(--red2);}

/* ─── INLINE EDIT PATTERN ────────────────────────────────────── */
.ie-wrap{display:flex;align-items:center;gap:5px;}
.ie-pencil{background:transparent;border:none;color:var(--t3);cursor:pointer;padding:3px;display:inline-flex;align-items:center;border-radius:3px;transition:color .15s,background .15s;flex-shrink:0;}
.ie-pencil:hover{color:var(--white);background:rgba(255,255,255,.06);}
.ie-pencil svg{width:13px;height:13px;}
.ie-input{background:transparent;border:none;border-bottom:2px solid var(--red);color:inherit;font:inherit;outline:none;padding:2px 0;min-width:80px;width:100%;}
.ie-save{background:var(--run);border:none;color:#fff;border-radius:4px;padding:3px 9px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.06em;cursor:pointer;flex-shrink:0;transition:background .15s;}
.ie-save:hover{filter:brightness(1.1);}
.ie-cancel{background:transparent;border:1px solid var(--border2);color:var(--t2);border-radius:4px;padding:3px 7px;font-size:12px;cursor:pointer;flex-shrink:0;}
.ie-cancel:hover{border-color:var(--t1);}
/* Sidebar user edit */
.sb-logo-sub{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);letter-spacing:.04em;}
.sb-user-text{flex:1;}
/* Profile edit in Overview */
.profile-edit-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.profile-edit-row:last-child{border-bottom:none;}
.profile-edit-key{font-size:11px;color:var(--t3);flex:0 0 auto;max-width:45%;}
.profile-edit-val{font-size:13px;color:var(--t1);text-align:right;flex:1;}
.profile-edit-val input{background:transparent;border:none;border-bottom:1px solid var(--red);color:var(--white);font:inherit;font-size:13px;text-align:right;outline:none;width:100%;}
.btn-add-profile-row{background:transparent;border:1px dashed var(--border2);color:var(--t2);border-radius:5px;padding:6px 12px;font-size:12px;cursor:pointer;width:100%;text-align:center;transition:all .15s;font-family:inherit;margin-top:8px;}
.btn-add-profile-row:hover{border-color:var(--t1);color:var(--white);}
.profile-add-row{display:none;gap:6px;margin-top:6px;}
.profile-add-row.visible{display:flex;}
.profile-add-row input{flex:1;background:var(--s2);border:1px solid var(--border2);border-radius:5px;color:var(--white);font-family:inherit;font-size:12px;padding:6px 9px;outline:none;}
.profile-add-row input:focus{border-color:var(--red);}

/* ─── THEME SWITCHER ─────────────────────────────────────────── */
.theme-bar{padding:10px 12px;border-top:1px solid var(--border);}
.theme-bar-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);margin-bottom:7px;font-weight:600;}
.theme-swatches{display:flex;gap:6px;}
.theme-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .15s;flex-shrink:0;}
.theme-swatch:hover{transform:scale(1.15);}
.theme-swatch.active{border-color:var(--white);}

/* ─── THEMES ─────────────────────────────────────────────────── */
[data-theme="dark"]{
  --bg:#0d0e12;--s1:#13141d;--s2:#1a1b27;--s3:#22243a;
  --border:#252637;--border2:#2e3048;
  --white:#eff0f8;--t1:#c8c9e0;--t2:#8889aa;--t3:#4e4f6e;
}
[data-theme="ironman"]{
  --bg:#080808;--s1:#0f0f0f;--s2:#161616;--s3:#202020;
  --border:#242424;--border2:#303030;
  --white:#f0f0f0;--t1:#c0c0c0;--t2:#808080;--t3:#484848;
}
[data-theme="slate"]{

  --border:#2a3158;--border2:#333d6a;
  --white:#e8eaf6;--t1:#b0b8d8;--t2:#7080a8;--t3:#404c6e;
}
[data-theme="light"]{
  --bg:#f4f5f7;--s1:#ffffff;--s2:#f0f1f4;--s3:#e8eaef;
  --border:#dde0e8;--border2:#c8ccd8;
  --red:#d32f2f;--red2:#e53935;--red-dim:rgba(211,47,47,.08);--red-border:rgba(211,47,47,.2);
  --white:#1a1b2e;--t1:#2d2f45;--t2:#6668848;--t3:#9496b0;
  --swim:#0288d1;--bike:#f57f17;--run:#2e7d32;
}
[data-theme="light"] .sb-race-icon.c-tri{background:rgba(167,139,250,.2);}
[data-theme="light"] .sb-race-icon.c-run{background:rgba(46,125,50,.12);}

/* ─── UTILS ──────────────────────────────────────────────────── */
.divider{border:none;border-top:1px solid var(--border);margin:20px 0;}

/* ─── MOBILE TOP BAR ─────────────────────────────────────────── */
.mob-bar{
  display:none;position:fixed;top:0;left:0;right:0;height:52px;z-index:55;
  background:var(--s1);border-bottom:1px solid var(--border);
  align-items:center;padding:0 12px;gap:10px;
}
.mob-icon-btn{
  width:38px;height:38px;background:transparent;border:none;color:var(--t2);
  cursor:pointer;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;
}
.mob-icon-btn:hover{background:var(--s2);}
.mob-icon-btn svg{width:20px;height:20px;}
.mob-title{
  flex:1;font-family:'Barlow Condensed',sans-serif;font-weight:800;

}
#sb-backdrop{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);
  z-index:58;backdrop-filter:blur(2px);
}
#sb-backdrop.open{display:block;}

/* ─── MOBILE RESPONSIVE ──────────────────────────────────────── */
@media(max-width:768px){
  /* show top bar, hide nothing else yet */
  .mob-bar{display:flex;}
  #main{margin-left:0;padding-top:52px;}
  #sb-close-btn{display:flex !important;}

  /* sidebar becomes drawer */
  #sidebar{
    transform:translateX(-100%);
    transition:transform .28s cubic-bezier(.4,0,.2,1);
    box-shadow:none;
  }
  #sidebar.mob-open{
    transform:translateX(0);
    box-shadow:4px 0 32px rgba(0,0,0,.5);
  }

  /* page padding */
  #view-hub{padding:20px 16px 100px;}
  .race-header{padding:16px 16px 0;}
  .race-body{padding:20px 16px 100px;}

  /* hub */
  .hub-header{flex-direction:column;align-items:flex-start;gap:8px;margin-bottom:18px;}
  .hub-header h1{font-size:26px;}
  .hub-date-chip{align-self:flex-start;}
  .race-grid{grid-template-columns:1fr;}

  /* this week grid → vertical */
  .this-week-body{grid-template-columns:1fr;}
  .tw-day{border-right:none;}

  /* race hero */
  .race-header-top{flex-direction:column;gap:12px;}
  .rh-name{font-size:clamp(22px,6vw,32px);}
  .rh-right{align-self:flex-start;}
  .countdown{gap:5px;}
  .cd-val{font-size:20px;min-width:40px;padding:.15em .4em;}
  .cd-sep{font-size:16px;}
  .split-pill{font-size:11px;padding:5px 9px;}
  .phase-progress-bar{display:none;}/* too small to be useful on mobile */
  .pp-label{font-size:10px;}

  /* tabs → horizontal scroll */
  .race-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;gap:0;padding-bottom:0;}
  .race-tabs::-webkit-scrollbar{display:none;}
  .r-tab{white-space:nowrap;padding:12px 16px;font-size:12px;}

  /* today tab */
  .today-grid{grid-template-columns:1fr;}
  .today-card{padding:14px;}
  .today-session-row{padding:9px 0;}

  /* plan tab */
  .phase-toggle-row{padding:14px 14px;}
  .ph-num{font-size:26px;width:30px;}
  .wk-body{padding:4px 14px 12px;}
  .day-row{padding:7px 10px;flex-wrap:wrap;gap:6px;}
  .day-sessions{width:calc(100% - 38px);}
  .day-edit-btn{display:inline-flex !important;padding:4px 8px;font-size:10px;}
  .day-edit-btn svg{width:10px;height:10px;}
  .sess-chip{font-size:11px;padding:3px 8px;}
  .week-card-head{padding:11px 14px;}

  /* log tab */
  .log-stats{grid-template-columns:1fr 1fr;}
  .log-row{flex-wrap:wrap;gap:5px;padding:9px 0;}
  .log-row-plan{width:calc(100% - 56px);}
  .log-row-note{width:100%;padding-left:0;}
  .log-row-note input{width:100%;}
  .log-week-head{padding:11px 14px;}

  /* gear */
  .gear-groups{grid-template-columns:1fr;}

  /* overview */
  .ov-stats{grid-template-columns:1fr 1fr;}
  .ov-two-col{grid-template-columns:1fr;}

  /* wizard → bottom sheet */
  #wiz-overlay{padding:0;align-items:flex-end;}
  #wiz-modal{
    border-radius:18px 18px 0 0;max-height:95dvh;
    border-left:none;border-right:none;border-bottom:none;
  }
  .wiz-top{padding:20px 20px 0;}
  .wiz-steps-row{padding:14px 20px 0;}
  .wiz-body{padding:18px 20px;}
  .wiz-footer{padding:12px 20px;}
  .opt-grid{grid-template-columns:1fr 1fr;}

  /* edit modal → bottom sheet */
  #edit-overlay{padding:0;align-items:flex-end;}
  #edit-modal{
    border-radius:18px 18px 0 0;max-height:90dvh;
    border-left:none;border-right:none;border-bottom:none;
  }
  .edit-top{padding:18px 18px 0;}
  .edit-body{padding:16px 18px;}
  .edit-foot{padding:12px 18px;}

  /* theme bar inside drawer — make tappable */
  .theme-swatch{width:26px;height:26px;}
}

/* ── Extra small (iPhone SE etc.) ── */
@media(max-width:390px){
  .r-tab{padding:11px 12px;font-size:11px;}
  .cd-val{font-size:18px;min-width:36px;}
  .rc-name{font-size:19px;}
  .ov-stats{grid-template-columns:1fr;}
}

// ─── TYPE HELPERS ────────────────────────────────────────────────
function typeIcon(t){
  if(t==='hyrox') return 'hyrox';
  if(t.includes('703')||t.includes('full')||t.includes('olympic')||t.includes('sprint')) return 'tri';
  if(t.includes('run')||t.includes('half')||t.includes('marathon')||t.includes('5k')||t.includes('10k')) return 'run';
  if(t.includes('bike')||t.includes('cycl')) return 'bike';
  return 'flag';
}
function typeLabel(t){
  const m={'tri-703':'Ironman 70.3','tri-full':'Full Ironman','tri-olympic':'Olympic Tri','tri-sprint':'Sprint Tri','run-half':'Half Marathon','run-marathon':'Marathon','run-10k':'10K','run-5k':'5K','run-custom':'Running Race','hyrox':'Hyrox'};
  return m[t]||t;
}
function typeColor(t){
  if(t==='hyrox') return 'hyrox';
  if(t.startsWith('tri')) return 'tri';
  if(t.startsWith('run')) return 'run';
  if(t.startsWith('bike')) return 'bike';
  return 'run';
}

// ─── DATE HELPERS ────────────────────────────────────────────────
function weeksUntil(d){const diff=new Date(d)-new Date();return Math.max(0,Math.round(diff/604800000));}
function daysUntil(d){const t=new Date(d);t.setHours(6,0,0,0);return Math.max(0,Math.floor((t-new Date())/86400000));}
function fmtDate(d){return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});}
function weekRange(startStr,idx){
  const d=new Date(startStr);d.setDate(d.getDate()+idx*7);
  const e=new Date(d);e.setDate(e.getDate()+6);
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return`${d.getDate()} ${mo[d.getMonth()]} – ${e.getDate()} ${mo[e.getMonth()]}`;
}

// ─── CURRENT WEEK DETECTION ──────────────────────────────────────
function getCurrentWeekNum(race){
  // Derive plan start from first week's date string e.g. "11 May – 17 May"
  // Instead, we calculate from the first week's weekNum=1 anchor.
  // We use the race plan start which is always the Monday of the week containing "2026-05-11"
  const PLAN_START=new Date('2026-05-11');
  const today=new Date();today.setHours(0,0,0,0);PLAN_START.setHours(0,0,0,0);
  const daysDiff=Math.floor((today-PLAN_START)/86400000);
  return Math.max(1,Math.floor(daysDiff/7)+1);
}
function getCurrentPhase(race){
  const wn=getCurrentWeekNum(race);
  for(const ph of race.phases||[]){
    const inPhase=(ph.weeks||[]).some(w=>w.weekNum===wn);
    if(inPhase) return ph;
  }
  return null;
}
function getAllWeeks(race){return(race.phases||[]).flatMap(p=>p.weeks||[]);}
function getCurrentWeekObj(race){const wn=getCurrentWeekNum(race);return getAllWeeks(race).find(w=>w.weekNum===wn)||null;}
function getTodayDayKey(){const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];return days[new Date().getDay()];}

// ─── SESSION COLOUR CLASSIFIER ───────────────────────────────────
function sessColor(v){
  if(!v||v==='—') return 'rest';
  const lv=v.toLowerCase();
  if(lv.includes('swim')||lv.includes('ow')) return 'swim';
  if(lv.includes('bike+')||lv.includes('brick')||lv.includes('simulation')) return 'brick';
  if(lv.includes('bike')||lv.includes('base-')||lv.includes('build-')||lv.includes('peak-')||lv.includes('taper-')||lv.includes('trainer')||lv.includes('spin')||lv.includes('z2 bike')) return 'bike';
  if(lv.includes('gym')||lv.includes('sled')||lv.includes('hyrox')) return 'gym';
  if(lv.includes('rest')||lv.includes('mobility')||lv.includes('yoga')) return 'rest';
  return 'run';
}
function sessDotColor(cls){
  const m={swim:'var(--swim)',bike:'var(--bike)',run:'var(--run)',brick:'var(--tri)',gym:'var(--hyrox)',rest:'var(--t3)'};
  return m[cls]||'var(--t2)';
}

// ─── CONFLICT DETECTION ──────────────────────────────────────────
function detectConflicts(races){
  const out=[];
  for(let i=0;i<races.length;i++)for(let j=i+1;j<races.length;j++){
    const d=Math.abs(daysUntil(races[i].date)-daysUntil(races[j].date));
    if(d<=14) out.push({a:races[i].id,b:races[j].id,days:d});
  }
  return out;
}

// ─── THIS WEEK ────────────────────────────────────────────────────
function renderThisWeek(races){
  const panel=document.getElementById('this-week-panel');
  // Find most relevant race: soonest that has started
  const active=races.filter(r=>daysUntil(r.date)>0).sort((a,b)=>daysUntil(a.date)-daysUntil(b.date));
  if(!active.length){panel.style.display='none';return;}
  const r=active[0];
  const wObj=getCurrentWeekObj(r);
  if(!wObj){panel.style.display='none';return;}
  panel.style.display='block';
  document.getElementById('this-week-label').textContent=`Week ${wObj.weekNum} · ${wObj.dates}`;
  const ph=getCurrentPhase(r);
  document.getElementById('this-week-phase').textContent=ph?`${r.name} · ${ph.name}`:'';
  const DAY_ORDER=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const today=getTodayDayKey();
  document.getElementById('this-week-body').innerHTML=DAY_ORDER.map(day=>{
    const sess=wObj.sessions[day];
    const isToday=day===today;
    const parts=sess?sess.split('+'): [];
    const sessHtml=sess
      ? parts.map(p=>{
          const cls=sessColor(p.trim());
          return`<div class="tw-session"><span class="tw-session-dot" style="background:${sessDotColor(cls)}"></span><span>${p.trim()}</span></div>`;
        }).join('')
      : `<div class="tw-rest">Rest</div>`;
    return`<div class="tw-day" style="${isToday?'background:rgba(229,57,53,.06);border-left:2px solid var(--red-border)':''}">
      <div class="tw-day-name" style="${isToday?'color:var(--red2)':''}">${day}${isToday?' · Today':''}</div>
      <div class="tw-sessions">${sessHtml}</div>
    </div>`;
  }).join('');
}

function renderPhaseProgress(r){
  const allWeeks=getAllWeeks(r);
  const total=allWeeks.length;
  const curWn=getCurrentWeekNum(r);
  const ph=getCurrentPhase(r);
  const bar=document.getElementById('phase-progress-bar');
  const lbl=document.getElementById('pp-label');
  if(!total){bar.innerHTML='';lbl.textContent='';return;}
  bar.innerHTML=allWeeks.map(w=>{
    const cls=w.weekNum<curWn?'done':w.weekNum===curWn?'current':'';
    return`<div class="pp-seg ${cls}" title="Week ${w.weekNum}"></div>`;
  }).join('');
  lbl.textContent=ph?`${ph.name} · Week ${curWn} of ${total}`:'';
}

function startCountdown(raceId,dateStr){
  if(_timers[raceId])clearInterval(_timers[raceId]);
  function tick(){
    const race=new Date(dateStr);race.setHours(6,0,0,0);
    const diff=race-new Date();
    const el=document.getElementById('race-countdown');if(!el)return;
    if(diff<=0){el.innerHTML='<span style="font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:28px;color:var(--red2)">RACE DAY</span>';return;}
    const d=Math.floor(diff/86400000),h=Math.floor(diff%86400000/3600000),m=Math.floor(diff%3600000/60000),s=Math.floor(diff%60000/1000);
    el.innerHTML=`
      <div class="cd-block"><span class="cd-val">${String(d).padStart(3,'0')}</span><div class="cd-lbl">Days</div></div>
      <span class="cd-sep">:</span>
      <div class="cd-block"><span class="cd-val">${String(h).padStart(2,'0')}</span><div class="cd-lbl">Hrs</div></div>
      <span class="cd-sep">:</span>
      <div class="cd-block"><span class="cd-val">${String(m).padStart(2,'0')}</span><div class="cd-lbl">Min</div></div>
      <span class="cd-sep">:</span>
      <div class="cd-block"><span class="cd-val">${String(s).padStart(2,'0')}</span><div class="cd-lbl">Sec</div></div>`;
  }
  tick();_timers[raceId]=setInterval(tick,1000);
}

function renderTabLog(r){

  const total=countTotal(r),done=countDone(r);
  const pct=total>0?Math.round(done/total*100):0;
  const curWn=getCurrentWeekNum(r);
  // Derive days from actual session data so Sun (and any custom days) appear automatically
  const usedLogDays=new Set(allWeeks.flatMap(w=>Object.keys(w.sessions||{})));
  const DAYS=ALL_DAYS.filter(d=>usedLogDays.has(d));
  const skipped=getAllWeeks(r).reduce((a,w)=>{
    const lk=`log_${r.id}_w${w.weekNum}`;
    const ld=JSON.parse(localStorage.getItem(lk)||'{}');
    return a+ALL_DAYS.filter(d=>w.sessions&&w.sessions[d]&&w.sessions[d]!=='—'&&getStatus(ld[d])==='skipped').length;
  },0);
  const statsHtml=`<div class="log-stats">
    <div class="log-stat"><div class="log-stat-label">Done</div><div class="log-stat-val" style="color:var(--run)">${done}<span style="font-size:16px;color:var(--t3)">/${total}</span></div><div class="log-stat-sub">${pct}% complete</div></div>
    <div class="log-stat"><div class="log-stat-label">Skipped</div><div class="log-stat-val" style="color:${skipped>0?'var(--bike)':'var(--t3)'}">${skipped}</div><div class="log-stat-sub">${skipped?'sessions missed':''}&nbsp;</div></div>
    <div class="log-stat"><div class="log-stat-label">Current Week</div><div class="log-stat-val">${curWn}</div><div class="log-stat-sub">of ${allWeeks.length}</div></div>
    <div class="log-stat"><div class="log-stat-label">To Race</div><div class="log-stat-val">${daysUntil(r.date)}</div><div class="log-stat-sub">days</div></div>
  </div>`;
  const weeksHtml=allWeeks.map(w=>{
    const logKey=`log_${r.id}_w${w.weekNum}`;
    const logData=JSON.parse(localStorage.getItem(logKey)||'{}');
    const wDays=DAYS.filter(d=>w.sessions[d]&&w.sessions[d]!=='—');
    const wDone=wDays.filter(d=>getStatus(logData[d])==='done').length;
    const wSkip=wDays.filter(d=>getStatus(logData[d])==='skipped').length;
    const wPct=wDays.length>0?Math.round(wDone/wDays.length*100):0;
    const isCur=w.weekNum===curWn;
    const rows=wDays.map(d=>{
      const status=getStatus(logData[d]);
      const noteVal=(logData[d]?.note||'').replace(/"/g,'&quot;');
      const btnIcon=status==='done'?IC.check:status==='skipped'?IC.skip:'';
      const btnTitle=status===null?'Tap to mark done':status==='done'?'Tap to mark skipped':'Tap to clear';
      return`<div class="log-row${status?' s-'+status:''}">
        <span class="log-row-day">${d}</span>
        <span class="log-row-plan">${w.sessions[d]}</span>
        <span style="display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0">
          <button class="status-btn${status?' s-'+status:''}" title="${btnTitle}" onclick="cycleStatus('${r.id}','${w.weekNum}','${d}','${logKey}',this)">${btnIcon}</button>
          <span class="status-label${status?' s-'+status:''}">${status?status.charAt(0).toUpperCase()+status.slice(1):''}</span>
        </span>
        <span class="log-row-note"><input type="text" value="${noteVal}" placeholder="Notes / RPE…" onchange="logSession('${r.id}','${w.weekNum}','${d}','note',this.value,'${logKey}')"></span>
      </div>`;
    }).join('');
    const reflVal=(logData['_refl']||'').replace(/"/g,'&quot;');
    return`<div class="log-week${isCur?' current':''}">
      <div class="log-week-head" onclick="toggleLogWeek(this)">
        <span class="log-week-num">Week ${w.weekNum}</span>
        <span class="log-week-dates">${w.dates} · ${w.phase}</span>
        <span class="log-week-prog">${wDone} done${wSkip?` · <span style="color:var(--bike)">${wSkip} skipped</span>`:''}</span>
        <span style="color:var(--t3)">${IC.chevdown}</span>

      <div class="log-week-body${isCur?' open':''}">

        </div>

  }).join('');
  document.getElementById('tab-log').innerHTML=statsHtml+`<div class="log-list">${weeksHtml}</div>`;

// ─── STATUS HELPERS ───────────────────────────────────────────────
// Returns 'done' | 'skipped' | null from stored day data
function getStatus(dayData){
  if(!dayData) return null;
  if(dayData.status) return dayData.status;
  if(dayData.done) return 'done'; // backward compat
  return null;
}

// Cycle: null → done → skipped → null
function cycleStatus(rId,wNum,day,logKey,btn){
  const store=JSON.parse(localStorage.getItem(logKey)||'{}');
  if(!store[day]) store[day]={};
  const cur=getStatus(store[day]);
  const next=cur===null?'done':cur==='done'?'skipped':null;
  store[day].status=next;
  store[day].done=(next==='done'); // keep backward compat
  localStorage.setItem(logKey,JSON.stringify(store));
  // Update button UI without full re-render
  if(btn){
    btn.className=`status-btn${next?' s-'+next:''}`;
    btn.innerHTML=next==='done'?IC.check:next==='skipped'?IC.skip:'';
    btn.title=next===null?'Tap to mark done':next==='done'?'Tap to mark skipped':'Tap to clear';
    // Update the row class
    const row=btn.closest('.log-row');
    if(row){row.className=`log-row${next?' s-'+next:''}`;}
    // Update status label
    const lbl=btn.parentElement?.querySelector('.status-label');
    if(lbl){lbl.textContent=next?next.charAt(0).toUpperCase()+next.slice(1):'';lbl.className=`status-label${next?' s-'+next:''}`;}
  }
  _refreshLogProgressBar(rId,wNum,logKey);
  renderSidebar();
}

// Set explicit status (used from Today tab buttons)
function setStatus(rId,wNum,day,newStatus,logKey){
  const store=JSON.parse(localStorage.getItem(logKey)||'{}');
  if(!store[day]) store[day]={};
  const cur=getStatus(store[day]);
  // Toggle: clicking active state clears it
  const next=(cur===newStatus)?null:newStatus;
  store[day].status=next;
  store[day].done=(next==='done');
  localStorage.setItem(logKey,JSON.stringify(store));
  // Re-render the full race view so Today + Log both sync
  const r=DATA.races.find(x=>x.id===rId);
  if(r) renderRace(rId);
  _refreshLogProgressBar(rId,wNum,logKey);
  renderSidebar();
}

// ─── CUSTOM WORKOUTS ─────────────────────────────────────────────
function showCustomInput(day){
  const row=document.getElementById(`ci_row_${day}`);
  if(row){row.classList.add('visible');row.querySelector('input').focus();}
  const btn=document.getElementById(`ci_btn_${day}`);
  if(btn)btn.style.display='none';
}
function hideCustomInput(day){
  const row=document.getElementById(`ci_row_${day}`);
  if(row){row.classList.remove('visible');const inp=row.querySelector('input');if(inp)inp.value='';}
  const btn=document.getElementById(`ci_btn_${day}`);
  if(btn)btn.style.display='';
}
function addCustomWorkout(rId,wNum,day,logKey,inputId){
  const inp=document.getElementById(inputId);
  const text=inp?inp.value.trim():'';
  if(!text)return;
  const store=JSON.parse(localStorage.getItem(logKey)||'{}');
  const key=`_custom_${day}`;
  if(!store[key])store[key]=[];
  store[key].push({id:Date.now().toString(),text,status:null});
  localStorage.setItem(logKey,JSON.stringify(store));
  // Re-render today tab
  const r=DATA.races.find(x=>x.id===rId);
  if(r){renderTabToday(r);// keep the tab visible
  ['today','plan','log','gear','overview'].forEach(t=>{const el=document.getElementById('tab-'+t);if(el)el.style.display=t==='today'?'block':'none';});}
}
function removeCustomWorkout(rId,wNum,day,id,logKey){
  const store=JSON.parse(localStorage.getItem(logKey)||'{}');
  const key=`_custom_${day}`;
  if(store[key])store[key]=store[key].filter(w=>w.id!==id);
  localStorage.setItem(logKey,JSON.stringify(store));
  const r=DATA.races.find(x=>x.id===rId);
  if(r){renderTabToday(r);['today','plan','log','gear','overview'].forEach(t=>{const el=document.getElementById('tab-'+t);if(el)el.style.display=t==='today'?'block':'none';});}
}
function cycleCustomStatus(rId,wNum,day,id,logKey){
  const store=JSON.parse(localStorage.getItem(logKey)||'{}');
  const key=`_custom_${day}`;
  if(store[key]){const w=store[key].find(x=>x.id===id);if(w){const cur=w.status;w.status=cur===null?'done':cur==='done'?'skipped':null;}}
  localStorage.setItem(logKey,JSON.stringify(store));
  const r=DATA.races.find(x=>x.id===rId);
  if(r){renderTabToday(r);['today','plan','log','gear','overview'].forEach(t=>{const el=document.getElementById('tab-'+t);if(el)el.style.display=t==='today'?'block':'none';});}
}

function _refreshLogProgressBar(rId,wNum,logKey){
  const r=DATA.races.find(x=>x.id===rId);if(!r)return;
  const allWeeks=getAllWeeks(r);
  const w=allWeeks.find(x=>x.weekNum==wNum);if(!w)return;
  const usedDays=new Set(allWeeks.flatMap(x=>Object.keys(x.sessions||{})));
  const DAYS=ALL_DAYS.filter(x=>usedDays.has(x));
  const wDays=DAYS.filter(x=>w.sessions[x]&&w.sessions[x]!=='—');
  const store=JSON.parse(localStorage.getItem(logKey)||'{}');
  const wDone=wDays.filter(x=>getStatus(store[x])==='done').length;
  const wSkip=wDays.filter(x=>getStatus(store[x])==='skipped').length;
  const pct=wDays.length?Math.round(wDone/wDays.length*100):0;
  document.querySelectorAll('#tab-log .log-week').forEach(el=>{
    const title=el.querySelector('.log-week-num');
    if(title&&title.textContent===`Week ${wNum}`){
      const bar=el.querySelector('.log-bar-fill');if(bar)bar.style.width=pct+'%';
      const prog=el.querySelector('.log-week-prog');
      if(prog)prog.textContent=`${wDone} done${wSkip?` · ${wSkip} skipped`:''}`;
    }
  });
}

function logSession(rId,wNum,day,field,val,logKey){
  const d=JSON.parse(localStorage.getItem(logKey)||'{}');
  if(!d[day])d[day]={};
  d[day][field]=val;
  localStorage.setItem(logKey,JSON.stringify(d));
  // Refresh log progress bar for this week without full re-render
  const allWeeks=getAllWeeks(DATA.races.find(x=>x.id===rId)||{});
  const w=allWeeks.find(x=>x.weekNum==wNum);
  if(w){
    const usedDays=new Set(allWeeks.flatMap(x=>Object.keys(x.sessions||{})));
    const DAYS=ALL_DAYS.filter(x=>usedDays.has(x));
    const wDays=DAYS.filter(x=>w.sessions[x]&&w.sessions[x]!=='—');
    const wDone=wDays.filter(x=>JSON.parse(localStorage.getItem(logKey)||'{}')[x]?.done).length;
    const pct=wDays.length?Math.round(wDone/wDays.length*100):0;
    const fill=document.querySelector(`#tab-log .log-bar-fill`);// update first visible bar as proxy
    // Update the specific week's bar by finding it
    document.querySelectorAll('#tab-log .log-week').forEach(el=>{
      const title=el.querySelector('.log-week-num');
      if(title&&title.textContent===`Week ${wNum}`){
        const bar=el.querySelector('.log-bar-fill');
        if(bar) bar.style.width=pct+'%';
        const prog=el.querySelector('.log-week-prog');
        if(prog) prog.textContent=`${wDone}/${wDays.length} done`;
      }
    });
  }
  renderSidebar();
}

function renderTabOverview(r){

  const total=countTotal(r),done=countDone(r);
  const pct=total>0?Math.round(done/total*100):0;
  const conflictHtml=myConflicts.map(c=>{
    const other=DATA.races.find(x=>x.id===(c.a===r.id?c.b:c.a));
    return other?`<div class="conflict-strip">${IC.alert}<span><strong>Race proximity:</strong> ${r.name} and ${other.name} are ${c.days} days apart — consider treating one as a tune-up.</span></div>`:''
  }).join('');

  </div>`;

// ─── COUNT HELPERS ───────────────────────────────────────────────
function countTotal(r){return getAllWeeks(r).reduce((a,w)=>a+ALL_DAYS.filter(d=>w.sessions&&w.sessions[d]&&w.sessions[d]!=='—').length,0);}
function countDone(r){
  return getAllWeeks(r).reduce((a,w)=>{
    const d=JSON.parse(localStorage.getItem(`log_${r.id}_w${w.weekNum}`)||'{}');
    return a+ALL_DAYS.filter(k=>w.sessions&&w.sessions[k]&&w.sessions[k]!=='—'&&getStatus(d[k])==='done').length;
  },0);
}

// targetDay: if set, show focused single-day edit. If null, show all days for the week.
function openEdit(raceId,weekNum,targetDay,evt){
  if(evt)evt.stopPropagation();
  const r=DATA.races.find(x=>x.id===raceId);if(!r)return;
  let week=null;for(const ph of r.phases||[]){week=(ph.weeks||[]).find(w=>w.weekNum===weekNum);if(week)break;}
  if(!week)return;
  _editTarget={raceId,weekNum,day:targetDay||null};

  if(targetDay){
    // ── Focused single-day edit ──────────────────────────────────
    document.getElementById('edit-title').textContent=`Edit — ${targetDay}`;
    const cur=(week.sessions[targetDay]||'').replace(/"/g,'&quot;');
    document.getElementById('edit-body').innerHTML=`
      <div style="font-size:12px;color:var(--t3);margin-bottom:14px">Week ${weekNum} · ${week.dates}</div>
      <div class="edit-field">
        <label>${targetDay} — Session</label>
        <input id="ef_day" type="text" value="${cur}" placeholder="e.g. 45 min easy run" autofocus>
      </div>
      <div style="font-size:11px;color:var(--t3);margin-top:2px">Separate dual sessions with + e.g. "Swim 45 min (AM) + 40 min easy run". Leave blank to remove.</div>`;
  } else {
    // ── Full week edit ───────────────────────────────────────────
    document.getElementById('edit-title').textContent=`Edit — Week ${weekNum}`;
    const existingDays=new Set(Object.keys(week.sessions||{}));
    const showDays=ALL_DAYS.filter(d=>existingDays.has(d)||['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].includes(d));
    document.getElementById('edit-body').innerHTML=
      ALL_DAYS.map(d=>`<div class="edit-field"><label>${d}</label><input id="ef_${d}" type="text" value="${(week.sessions[d]||'').replace(/"/g,'&quot;')}" placeholder="Leave blank to skip"></div>`).join('')+
      `<div class="edit-field"><label>Week Note</label><input id="ef_note" type="text" value="${(week.note||'').replace(/"/g,'&quot;')}" placeholder="Optional note for this week"></div>`;
  }
  document.getElementById('edit-overlay').classList.add('open');
  // Auto-focus
  setTimeout(()=>{const f=document.getElementById('ef_day')||document.getElementById('ef_Mon');if(f)f.focus();},80);
}

function closeEdit(){document.getElementById('edit-overlay').classList.remove('open');_editTarget=null;_profileEditRaceId=null;}

function saveEdit(){
  if(!_editTarget)return;
  const r=DATA.races.find(x=>x.id===_editTarget.raceId);if(!r)return;
  let week=null;for(const ph of r.phases||[]){week=(ph.weeks||[]).find(w=>w.weekNum===_editTarget.weekNum);if(week)break;}
  if(!week)return;
  if(_editTarget.day){
    // Save single day
    const el=document.getElementById('ef_day');
    if(el){const v=el.value.trim();if(v)week.sessions[_editTarget.day]=v;else delete week.sessions[_editTarget.day];}
  } else {
    // Save full week
    ALL_DAYS.forEach(d=>{const el=document.getElementById('ef_'+d);if(el){const v=el.value.trim();if(v)week.sessions[d]=v;else delete week.sessions[d];}});
    const n=document.getElementById('ef_note');if(n)week.note=n.value.trim();
  }
  save();closeEdit();showRace(_editTarget.raceId);
}

  document.getElementById('btn-wiz-next').textContent=_wiz.step===WIZ_STEPS.length-1?'Generate Plan':'Next';
  // Step indicator
  document.getElementById('wiz-steps-row').innerHTML=WIZ_STEPS.map((s,i)=>{
    const cls=i<_wiz.step?'done':i===_wiz.step?'active':'';
    const line=i<WIZ_STEPS.length-1?`<div class="wiz-step-line${i<_wiz.step?' done':''}"></div>`:'';
    return`<div class="wiz-step-pip"><div class="wiz-step-circle ${cls}">${i<_wiz.step?IC.check:i+1}</div>${line}</div>`;
  }).join('');
  let fields=step.fields||[];
  if(step.fields_fn) fields=window[step.fields_fn](_wiz.data);
  document.getElementById('wiz-body').innerHTML=fields.map(f=>{
    let inp='';
    if(f.type==='text') inp=`<input class="wiz-input" id="wf_${f.id}" type="text" placeholder="${f.placeholder||''}" value="${_wiz.data[f.id]||''}">`;
    else if(f.type==='date') inp=`<input class="wiz-input" id="wf_${f.id}" type="date" value="${_wiz.data[f.id]||''}">`;
    else if(f.type==='select'){
      inp=`<select class="wiz-select" id="wf_${f.id}">${f.options.map(o=>`<option value="${o.value}"${_wiz.data[f.id]===o.value?' selected':''}>${o.label}</option>`).join('')}</select>`;
    } else if(f.type==='opts'){
      let opts=f.opts||[];if(f.opts_fn)opts=window[f.opts_fn](_wiz.data);
      inp=`<div class="opt-grid">${opts.map(o=>`<button type="button" class="opt-btn${_wiz.data[f.id]===o.value?' selected':''}" onclick="selOpt('${f.id}','${o.value}',this)"><div class="opt-title">${o.title}</div><div class="opt-desc">${o.desc}</div></button>`).join('')}
      <button type="button" class="opt-btn${_wiz.data[f.id]==='other'?' selected':''}" onclick="selOpt('${f.id}','other',this)"><div class="opt-title">Other</div><div class="opt-desc">Describe your situation</div></button></div>
      <div class="opt-other-wrap${_wiz.data[f.id]==='other'?' visible':''}" id="ow_${f.id}"><input class="wiz-input" id="owt_${f.id}" type="text" placeholder="Tell us more…" value="${_wiz.data[f.id+'_other']||''}"></div>`;
    } else if(f.type==='lifestyle'){
      const selected=_wiz.data.considerations||[];
      const chipGroups=CONSIDERATION_CHIPS.map(g=>`
        <div class="chip-group">
          <span class="chip-group-label">${g.group}</span>
          <div class="chip-grid">${g.chips.map(c=>`
            <button type="button" class="chip-toggle${selected.includes(c.val)?' selected':''}" data-val="${c.val}" onclick="toggleChip(this)">
              ${IC.check} ${c.label}
            </button>`).join('')}
          </div>
        </div>`).join('');
      inp=`
        ${chipGroups}
        <div class="wiz-field" style="margin-bottom:0">
          <label class="wiz-label">Anything else we should know?</label>
          <textarea class="considerations-textarea" id="wf_considerations_note" placeholder="e.g. I coach kids football on weekends, I'm aiming for a promotion and work is hectic until August, I prefer not to train on Sundays…">${_wiz.data.considerationsNote||''}</textarea>
          <p class="considerations-hint">The more context you give, the more accurately we can tailor your plan to your life — not just your sport.</p>
        </div>`;
    }
    return`<div class="wiz-field"><label class="wiz-label">${f.label||''}</label>${inp}</div>`;
  }).join('');
}

function selOpt(fid,val,btn){
  _wiz.data[fid]=val;
  btn.closest('.opt-grid').querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  const wrap=document.getElementById('ow_'+fid);
  if(wrap){wrap.classList.toggle('visible',val==='other');if(val==='other')wrap.querySelector('input').focus();}
}

function wizBack(){if(_wiz.step>0){_wiz.step--;renderWizStep();}}
function wizNext(){
  const step=WIZ_STEPS[_wiz.step];
  let fields=step.fields||[];if(step.fields_fn)fields=window[step.fields_fn](_wiz.data);
  fields.forEach(f=>{
    if(f.type==='lifestyle'){
      // Collect textarea note (chips already tracked live via toggleChip)
      const ta=document.getElementById('wf_considerations_note');
      if(ta)_wiz.data.considerationsNote=ta.value.trim();
      return;
    }
    const el=document.getElementById('wf_'+f.id);if(el)_wiz.data[f.id]=el.value;
    if(f.type==='opts'&&_wiz.data[f.id]==='other'){const ot=document.getElementById('owt_'+f.id);if(ot)_wiz.data[f.id+'_other']=ot.value.trim();}
  });
  if(_wiz.step<WIZ_STEPS.length-1){_wiz.step++;renderWizStep();}
  else{const r=generatePlan(_wiz.data);DATA.races.push(r);save();closeWizard();renderSidebar();showHub();}
}

// ─── PLAN GENERATOR ──────────────────────────────────────────────
function resolveOther(val,fallback,free){return val==='other'?{r:fallback,note:free||''}:{r:val||fallback,note:''};}

function generatePlan(d){
  const id='race-'+Date.now();
  const totalWeeks=Math.min(weeksUntil(d.raceDate),24);
  const s=new Date();s.setDate(s.getDate()+7-s.getDay()+1);
  const startStr=s.toISOString().split('T')[0];
  const type=d.raceType||'run-half';
  const {r:goal,note:gNote}=resolveOther(d.goal,'finish',d.goal_other);
  const {r:run}=resolveOther(d.runFitness,'moderate',d.runFitness_other);
  const {r:bike}=resolveOther(d.bikeFitness,'moderate',d.bikeFitness_other);
  const {r:swim}=resolveOther(d.swimFitness,'moderate',d.swimFitness_other);
  const {r:hours}=resolveOther(d.weeklyHours,'8-10',d.weeklyHours_other);
  const {r:inj}=resolveOther(d.injuries,'none',d.injuries_other);
  const otherNotes=[d.goal_other,d.runFitness_other,d.bikeFitness_other,d.weeklyHours_other,d.injuries_other].filter(Boolean).join(' · ');

  // Build personalised consideration notes from step 6
  const selectedChips=d.considerations||[];
  const chipNoteLines=selectedChips.map(c=>CHIP_NOTES[c]).filter(Boolean);
  if(d.considerationsNote) chipNoteLines.push(`Additional note: ${d.considerationsNote}`);
  const considerationsBlock=chipNoteLines.length
    ? '\n\nPersonalised considerations:\n'+chipNoteLines.map((n,i)=>`${i+1}. ${n}`).join('\n')
    : '';

  // Profile additions from considerations
  const considerationsProfile={};
  if(selectedChips.length) considerationsProfile['Considerations']=[...selectedChips.map(c=>CHIP_LABELS[c]||c),...(d.considerationsNote?[d.considerationsNote]:[])].join(', ');
  let p1=Math.round(totalWeeks*.33),p2=Math.round(totalWeeks*.33),p3=Math.round(totalWeeks*.2),p4=totalWeeks-p1-p2-p3;
  if(p4<1)p4=1;
  const weeks=[];let wi=0;
  const push=(phase,sess,rec=false,note='')=>{weeks.push({weekNum:++wi,dates:weekRange(startStr,wi-1),sessions:sess,note,isRecovery:rec,brick:false,phase});};

  if(type==='hyrox'){
    for(let i=0;i<p1;i++){const rec=i===Math.floor(p1/2)-1||i===p1-1;push('base',{Mon:`${25+i*2} min easy run`,Tue:`Gym ${40+i*3} min (rowing, ski erg, wall balls)`,Thu:`${22+i*2} min easy run`,Sat:`${35+i*3} min run + gym circuit`},rec,rec?'Recovery week':'');}
    for(let i=0;i<p2;i++){const rec=i===Math.floor(p2/2)-1||i===p2-1;push('build',{Mon:`${35+i*2} min run intervals`,Tue:`Gym ${50+i*3} min (sled push/pull, carries)`,Thu:`${30+i*2} min tempo run`,Sat:`Hyrox sim — 4 rounds: 1km run + 2 stations`},rec,rec?'Recovery week':'');}
    for(let i=0;i<p3;i++)push('peak',{Mon:'40 min race-pace run',Tue:'Gym 55 min (full station practice)',Thu:'35 min tempo run',Sat:'Full Hyrox simulation — 8 rounds at target pace'},false,i===p3-1?'Last full sim before taper':'');
    for(let i=0;i<p4;i++)push('taper',{Mon:`${Math.max(18,25-i*3)} min easy run`,Wed:'20 min easy + strides',Thu:`Gym ${30} min (light — maintain feel)`,Sat:`${Math.max(15,20-i*5)} min easy run`},false,`-${25+i*20}% volume`);
    const gls={finish:'Complete all stations',sub90:'Sub-90 min',sub75:'Sub-75 min',sub60:'Sub-60 min'};
    return{id,name:d.name||'Hyrox',type,date:d.raceDate,goal:d.goal==='other'&&d.goal_other?d.goal_other:(gls[goal]||goal),goalNote:gNote||'8 rounds: 1 km run + 1 station',splits:[{label:'Total',dist:'8 km + 8 stations',time:goal.replace('sub','Sub-').replace('90','1:30').replace('75','1:15').replace('60','1:00'),pace:'',cls:'run'}],profile:{run,gym:d.gymFitness||'moderate',hoursPerWeek:hours,injuries:inj},phases:[{id:'base',name:'Base',dates:`Weeks 1–${p1}`,desc:'Build running base and introduce functional movements.',weeks:weeks.filter(w=>w.phase==='base'),note:'Comfortable 30 min run + basic station movements'},{id:'build',name:'Build',dates:`Weeks ${p1+1}–${p1+p2}`,desc:'Add intensity. Practice stations under fatigue.',weeks:weeks.filter(w=>w.phase==='build'),note:'Complete 4-round sim without stopping'},{id:'peak',name:'Peak',dates:`Weeks ${p1+p2+1}–${p1+p2+p3}`,desc:'Full 8-round simulations. Race-pace run work.',weeks:weeks.filter(w=>w.phase==='peak'),note:'Full 8-round sim at target pace'},{id:'taper',name:'Taper',dates:`Weeks ${p1+p2+p3+1}–${totalWeeks}`,desc:'Volume drops. Keep intensity. Arrive sharp.',weeks:weeks.filter(w=>w.phase==='taper'),note:'Short and punchy — no heroics.'}],gear:[{group:'Race Day',color:'var(--hyrox)',items:['Trainers (low-drop for sled)','Knee sleeves (optional)','GPS watch','Water bottle','Race kit comfortable for rowing + running']}],zones:[{z:'Z2',name:'Easy Run',pct:'68–75%',rpe:'3–4',feel:'Full conversation',color:'var(--z2)'},{z:'Z3',name:'Tempo / Station pace',pct:'76–82%',rpe:'5–6',feel:'Sentences only',color:'var(--z3)'},{z:'Z4',name:'Race effort',pct:'83–89%',rpe:'7–8',feel:'Hard, controlled',color:'var(--z4)'}],notes:'Stations: SkiErg · Sled Push · Sled Pull · Burpee Broad Jump · Rowing · Farmers Carry · Sandbag Lunges · Wall Balls.'+(otherNotes?' Notes: '+otherNotes:'')+considerationsBlock,log:{}};

  for(let i=0;i<p4;i++)push('taper',{Mon:`${Math.max(20,35-i*5)} min run`,Tue:`${Math.max(30,65-i*10)} min easy bike`,Wed:`${Math.max(15,30-i*5)} min easy`,Fri:swimLabel,Sat:`${Math.max(40,90-i*15)} min easy + short run`},false,`-${25+i*15}% volume`);
